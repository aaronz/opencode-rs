name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM

env:
  CARGO_TERM_COLOR: always

jobs:
  # Stage 1: Source quality
  fmt-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings

  # Stage 2: Fast tests
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests (nextest)
        run: cargo nextest run --workspace --all-features
      - name: Run doc tests
        run: cargo test --workspace --doc

  # Stage 3: Feature matrix
  feature-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test no default features
        run: cargo test --workspace --no-default-features
      - name: Test all features
        run: cargo test --workspace --all-features

  # Stage 4: Coverage
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build documentation
        run: cargo doc --no-deps --all-features
      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 80

  # Stage 5: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo deny check
        run: cargo deny check || true
      - name: Build
        run: cargo build --release --all-features

  # Stage 6: Benchmarks
  benchmarks:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build benchmarks
        run: cargo bench --workspace --no-run || true
      - name: Check clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Stage 7: Nightly - Fuzz smoke
  fuzz-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz smoke test
        run: |
          for target in $(cargo fuzz list); do
            cargo fuzz run $target -- -max_total_time=30s || true
          done
        shell: bash

  # Release job
  release:
    needs: [fmt-clippy, test, feature-matrix, coverage, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release
        run: cargo build --release
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/opencode-rs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}