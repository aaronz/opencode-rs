[advisories]
version = 2
ignore = [
    "RUSTSEC-2025-0141",  # bincode - unmaintained, no safe upgrade
    "RUSTSEC-2025-0057",  # fxhash - unmaintained, no safe upgrade
    "RUSTSEC-2024-0436",  # paste - unmaintained, no safe upgrade
    "RUSTSEC-2024-0320",  # yaml-rust - unmaintained, no safe upgrade
    "RUSTSEC-2017-0008",  # serial - unmaintained, no safe upgrade
    "RUSTSEC-2026-0097",  # rand - unsound with custom logger, no safe upgrade yet
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "ISC",
    "OpenSSL",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[sources]
version = 2