<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode Web UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
        header { background: #161b22; padding: 12px 20px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
        #status { font-size: 12px; padding: 4px 8px; border-radius: 12px; }
        #status.connected { background: #238636; color: #fff; }
        #status.disconnected { background: #da3633; color: #fff; }
        #status.connecting { background: #d29922; color: #000; }
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; overflow-y: auto; padding: 16px; }
        .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; max-width: 80%; }
        .message.user { background: #1f6feb; color: #fff; align-self: flex-end; margin-left: auto; }
        .message.assistant { background: #161b22; border: 1px solid #21262d; }
        .message.system { background: #21262d; color: #8b949e; font-style: italic; }
        .message.tool { background: #1c2333; border: 1px solid #30363d; font-family: monospace; font-size: 13px; }
        .message .meta { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
        #input-area { padding: 16px; background: #161b22; border-top: 1px solid #21262d; display: flex; gap: 8px; }
        #prompt { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-family: inherit; font-size: 14px; resize: none; min-height: 44px; max-height: 150px; }
        #prompt:focus { border-color: #58a6ff; outline: none; }
        #send-btn { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 0 20px; font-weight: 600; cursor: pointer; }
        #send-btn:hover { background: #2ea043; }
        #send-btn:disabled { background: #30363d; cursor: not-allowed; }
        #sidebar { position: fixed; right: 0; top: 45px; bottom: 0; width: 300px; background: #161b22; border-left: 1px solid #21262d; transform: translateX(100%); transition: transform 0.2s; overflow-y: auto; z-index: 100; }
        #sidebar.open { transform: translateX(0); }
        #sidebar h2 { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #21262d; }
        .session-item { padding: 10px 16px; border-bottom: 1px solid #21262d; cursor: pointer; }
        .session-item:hover { background: #1f2937; }
        .session-item .name { font-size: 13px; font-weight: 500; }
        .session-item .date { font-size: 11px; color: #8b949e; }
        #toggle-sidebar { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 18px; }
        #toggle-sidebar:hover { color: #c9d1d9; }
        .loading { text-align: center; color: #8b949e; padding: 20px; }
        .error { background: #da3633; color: #fff; padding: 8px 12px; border-radius: 6px; margin: 8px 16px; font-size: 13px; }
        #nav { display: flex; gap: 8px; }
        .nav-btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 14px; padding: 4px 8px; }
        .nav-btn:hover { color: #58a6ff; }
        .page { display: none; }
        .page.active { display: block; }
        .settings-panel, .admin-panel { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; color: #8b949e; }
        .form-group input, .form-group select { width: 100%; max-width: 300px; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; }
        .btn-primary { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-primary:hover { background: #2ea043; }
        .permission-item { background: #161b22; border: 1px solid #21262d; padding: 12px; margin-bottom: 8px; border-radius: 6px; }
        .permission-item .header { display: flex; justify-content: space-between; align-items: center; }
        .permission-item .actions { display: flex; gap: 8px; margin-top: 8px; }
        .btn-approve { background: #238636; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-deny { background: #da3633; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div style="display:flex;align-items:center;gap:12px;">
            <h1>OpenCode</h1>
            <button id="toggle-sidebar" title="Sessions">&#9776;</button>
            <div id="nav">
                <button class="nav-btn" data-page="chat">Chat</button>
                <button class="nav-btn" data-page="settings">Settings</button>
                <button class="nav-btn" data-page="admin">Admin</button>
            </div>
        </div>
        <span id="status" class="disconnected">Disconnected</span>
    </header>
    <main>
        <div id="page-chat" class="page active">
            <div id="messages"></div>
            <div id="input-area">
                <textarea id="prompt" placeholder="Enter your prompt... (Ctrl+Enter to send)" rows="1"></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>
        <div id="page-settings" class="page">
            <div class="settings-panel">
                <h2>Settings</h2>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="api-key-input" placeholder="Enter your API key">
                </div>
                <div class="form-group">
                    <label>Default Model</label>
                    <select id="model-select">
                        <option value="gpt-4o">GPT-4O</option>
                        <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>
        <div id="page-admin" class="page">
            <div class="admin-panel">
                <h2>Admin Panel</h2>
                <div class="form-group">
                    <label>Provider Configuration</label>
                    <div id="provider-list"></div>
                </div>
                <div class="form-group">
                    <label>Permission Queue</label>
                    <div id="permission-queue"></div>
                </div>
            </div>
        </div>
    </main>
    <div id="sidebar">
        <h2>Sessions</h2>
        <div id="session-list"><div class="loading">Loading sessions...</div></div>
    </div>
    <script>
        const API_BASE = '/api';
        const WS_URL = `ws://${window.location.host}/ws`;
        const SSE_URL = '/sse';

        const messagesEl = document.getElementById('messages');
        const promptEl = document.getElementById('prompt');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const sidebarEl = document.getElementById('sidebar');
        const sessionListEl = document.getElementById('session-list');
        const toggleSidebarBtn = document.getElementById('toggle-sidebar');

        let currentSessionId = null;
        let eventSource = null;
        let ws = null;

        function setStatus(status) {
            statusEl.className = status;
            statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        }

        function addMessage(role, content, meta) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (meta) {
                const metaEl = document.createElement('div');
                metaEl.className = 'meta';
                metaEl.textContent = meta;
                div.appendChild(metaEl);
            }
            const contentEl = document.createElement('div');
            contentEl.textContent = content;
            div.appendChild(contentEl);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showError(message) {
            const div = document.createElement('div');
            div.className = 'error';
            div.textContent = message;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function loadSessions() {
            try {
                const res = await fetch(`${API_BASE}/sessions`, {
                    headers: { 'x-api-key': getApiKey() }
                });
                if (res.ok) {
                    const data = await res.json();
                    renderSessions(data.sessions || []);
                }
            } catch (e) {
                sessionListEl.innerHTML = '<div class="loading">Failed to load sessions</div>';
            }
        }

        function renderSessions(sessions) {
            if (sessions.length === 0) {
                sessionListEl.innerHTML = '<div class="loading">No sessions yet</div>';
                return;
            }
            sessionListEl.innerHTML = sessions.map(s => `
                <div class="session-item" data-id="${s.id}">
                    <div class="name">${s.name || 'Untitled'}</div>
                    <div class="date">${new Date(s.created_at).toLocaleString()}</div>
                </div>
            `).join('');
            sessionListEl.querySelectorAll('.session-item').forEach(el => {
                el.addEventListener('click', () => loadSession(el.dataset.id));
            });
        }

        async function loadSession(sessionId) {
            try {
                const res = await fetch(`${API_BASE}/sessions/${sessionId}`, {
                    headers: { 'x-api-key': getApiKey() }
                });
                if (res.ok) {
                    const session = await res.json();
                    currentSessionId = sessionId;
                    messagesEl.innerHTML = '';
                    (session.messages || []).forEach(msg => {
                        addMessage(msg.role, msg.content, msg.role === 'user' ? 'You' : 'Assistant');
                    });
                }
            } catch (e) {
                showError('Failed to load session');
            }
        }

        async function sendPrompt() {
            const prompt = promptEl.value.trim();
            if (!prompt) return;

            promptEl.value = '';
            sendBtn.disabled = true;
            addMessage('user', prompt, 'You');
            addMessage('system', 'Processing...', 'System');

            try {
                const res = await fetch(`${API_BASE}/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': getApiKey()
                    },
                    body: JSON.stringify({ prompt, session_id: currentSessionId })
                });

                if (res.ok) {
                    const data = await res.json();
                    currentSessionId = data.session_id;
                    messagesEl.querySelector('.message.system:last-child')?.remove();
                    addMessage('assistant', data.response || 'Response received', `Session: ${data.session_id}`);
                    loadSessions();
                } else {
                    const error = await res.text();
                    messagesEl.querySelector('.message.system:last-child')?.remove();
                    showError(`Error: ${error}`);
                }
            } catch (e) {
                messagesEl.querySelector('.message.system:last-child')?.remove();
                showError(`Network error: ${e.message}`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function connectSSE() {
            if (eventSource) eventSource.close();
            setStatus('connecting');
            eventSource = new EventSource(SSE_URL);
            eventSource.onopen = () => setStatus('connected');
            eventSource.onerror = () => {
                setStatus('disconnected');
                setTimeout(connectSSE, 3000);
            };
            eventSource.addEventListener('message', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'message') {
                        addMessage(data.role || 'assistant', data.content);
                    } else if (data.type === 'tool_call') {
                        addMessage('tool', `${data.tool_name}: ${JSON.stringify(data.args)}`, 'Tool Call');
                    } else if (data.type === 'session_update') {
                        addMessage('system', `Session ${data.session_id}: ${data.status}`, 'System');
                    }
                } catch (e) {}
            });
        }

        function getApiKey() {
            return localStorage.getItem('opencode_api_key') || '';
        }

        promptEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                sendPrompt();
            }
        });

        sendBtn.addEventListener('click', sendPrompt);
        toggleSidebarBtn.addEventListener('click', () => sidebarEl.classList.toggle('open'));

        loadSessions();
        connectSSE();

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(`page-${page}`).classList.add('active');
                if (page === 'admin') {
                    loadAdminData();
                }
            });
        });

        function saveSettings() {
            const apiKey = document.getElementById('api-key-input').value;
            localStorage.setItem('opencode_api_key', apiKey);
            alert('Settings saved!');
        }

        async function loadAdminData() {
            loadProviderList();
            loadPermissionQueue();
        }

        async function loadProviderList() {
            try {
                const res = await fetch(`${API_BASE}/providers`, {
                    headers: { 'x-api-key': getApiKey() }
                });
                if (res.ok) {
                    const data = await res.json();
                    renderProviderList(data.providers || []);
                }
            } catch (e) {
                document.getElementById('provider-list').innerHTML = '<div class="error">Failed to load providers</div>';
            }
        }

        function renderProviderList(providers) {
            if (providers.length === 0) {
                document.getElementById('provider-list').innerHTML = '<div class="loading">No providers configured</div>';
                return;
            }
            document.getElementById('provider-list').innerHTML = providers.map(p => `
                <div class="permission-item">
                    <div class="header">
                        <span>${p.name}</span>
                        <span>${p.protocol}</span>
                    </div>
                </div>
            `).join('');
        }

        async function loadPermissionQueue() {
            try {
                const res = await fetch(`${API_BASE}/permissions`, {
                    headers: { 'x-api-key': getApiKey() }
                });
                if (res.ok) {
                    const data = await res.json();
                    renderPermissionQueue(data.permissions || []);
                }
            } catch (e) {
                document.getElementById('permission-queue').innerHTML = '<div class="error">Failed to load permissions</div>';
            }
        }

        function renderPermissionQueue(permissions) {
            if (permissions.length === 0) {
                document.getElementById('permission-queue').innerHTML = '<div class="loading">No pending permissions</div>';
                return;
            }
            document.getElementById('permission-queue').innerHTML = permissions.map(p => `
                <div class="permission-item">
                    <div class="header">
                        <span>${p.tool_name}</span>
                        <span>${p.risk_level}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-approve" onclick="replyPermission('${p.id}', 'allow')">Approve</button>
                        <button class="btn-deny" onclick="replyPermission('${p.id}', 'deny')">Deny</button>
                    </div>
                </div>
            `).join('');
        }

        async function replyPermission(reqId, decision) {
            try {
                const res = await fetch(`${API_BASE}/permissions/${reqId}/reply`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': getApiKey()
                    },
                    body: JSON.stringify({ decision })
                });
                if (res.ok) {
                    loadPermissionQueue();
                }
            } catch (e) {
                alert('Failed to reply to permission');
            }
        }
    </script>
</body>
</html>
