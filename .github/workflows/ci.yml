name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cd opencode-rust && cargo build --release --all

      - name: Run tests
        run: cd opencode-rust && cargo test --all

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cd opencode-rust && cargo llvm-cov --all --fail-under-lines 80

      - name: Run clippy
        run: cd opencode-rust && cargo clippy --all -- -D warnings

      - name: Run cargo doc
        run: cd opencode-rust && cargo doc --no-deps --all-features

      - name: Run benchmarks
        run: cd opencode-rust/opencode-benches && cargo bench -- --noplot

      - name: Run benchmark regression test
        run: cd opencode-rust && cargo test --test benchmark_regression_tests
