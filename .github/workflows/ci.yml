name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up git config for tests
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@opencode.ai"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: |
          cd opencode-rust
          cargo fmt --all -- --check || {
            echo "Formatting issues found. Running cargo fmt to show differences..."
            cargo fmt --all -- --diff || true
            exit 1
          }

      - name: Build
        run: cd opencode-rust && cargo build --release --all

      - name: Run library tests
        run: cd opencode-rust && cargo test --lib -- --skip security_tests --skip tool_registry_audit_tests --skip xmodule_tests --skip phase6_regression_tests --skip conventions

      - name: Run opencode-git tests (sequential)
        run: cd opencode-rust && RUST_TEST_THREADS=1 cargo test -p opencode-git --lib

      - name: Run integration tests (single-threaded to avoid race conditions)
        run: cd opencode-rust && RUST_TEST_THREADS=1 cargo test --test '*'

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cd opencode-rust && cargo llvm-cov --all --fail-under-lines 80

      - name: Run clippy
        run: cd opencode-rust && cargo clippy --all -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cd opencode-rust && cargo audit

      - name: Run cargo doc
        run: cd opencode-rust && cargo doc --no-deps --all-features

      - name: Run benchmarks
        run: cd opencode-rust/opencode-benches && cargo bench -- --noplot

      - name: Run benchmark regression test
        run: cd opencode-rust && cargo test --test benchmark_regression_tests
